name: Prerelease (dev tag)

# On-demand: cut a prerelease tag from develop (vX.Y.Z-rc.N) when you want a
# labelled dev/test build. Run it from the Actions tab ("Run workflow") or with
# `gh workflow run prerelease.yml`.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Tag prerelease
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: v
          RELEASE_BRANCHES: main
          BRANCH_HISTORY: last
          PRERELEASE: true
          PRERELEASE_SUFFIX: rc

      - name: Publish prerelease
        if: steps.tag.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.new_tag }}" \
            --title "${{ steps.tag.outputs.new_tag }}" \
            --prerelease \
            --generate-notes \
            --target develop
