name: Release

# On every push to main (i.e. after a release/hotfix PR is merged):
#   1. tag the release (SemVer, bump from a #major/#minor/#patch token in the
#      commit message; default patch),
#   2. publish a GitHub Release with auto-generated notes.
# No build/deploy step here — Vercel's own Git integration already deploys
# on every push to main (and on every PR, as a preview), independently of
# this workflow.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag release
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: v
          RELEASE_BRANCHES: main
          # Read the bump token (#major/#minor/#patch) from the last commit's full
          # message — the PR merge commit. 'compare' (the default) yields an empty
          # range on the first tag and would ignore the token.
          BRANCH_HISTORY: last

      - name: Publish GitHub Release
        if: steps.tag.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.new_tag }}" \
            --title "${{ steps.tag.outputs.new_tag }}" \
            --generate-notes
